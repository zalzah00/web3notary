<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Notary</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="application/javascript"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h1>Data Science Audit Tool</h1>
    
    <div class="form-group">
        <label for="fileInput">1. Select Data/Model File</label>
        <input type="file" id="fileInput">
    </div>

    <div class="form-group">
        <label for="message">2. Audit Message</label>
        <input type="text" id="message" placeholder="e.g. Training Data Version 1.0">
    </div>

    <button id="mainBtn" onclick="processAndSign()">Upload & Notarize on Blockchain</button>

    <div id="status">
        System Ready. MetaMask: <span id="mm-check">Checking...</span>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
